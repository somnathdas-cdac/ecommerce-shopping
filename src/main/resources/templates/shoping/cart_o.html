<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head><title>Cart</title>

<link rel="stylesheet" th:href="@{/css/header_footer_side_bar.css}">
<link rel="stylesheet" th:href="@{/css/cart.css}">
 <style>
        .container { display: flex; flex-direction: column; height: 100vh; }
        .middle-section { display: flex; flex: 1; }
        .sidebar-container { width: 200px; background: #f4f4f4; }
        .main-window { flex: 1; padding: 20px; }
    </style>

<script th:inline="javascript">


function changeQty(index, delta) {
    const qtySpan = document.getElementById('qty-' + index);
    const price = parseFloat(document.getElementById('price-' + index).innerText);
    const subtotalCell = document.getElementById('sub-' + index);
    
    let currentQty = parseInt(qtySpan.innerText);
    let newQty = currentQty + delta;

    // Don't allow quantity less than 1
    if (newQty < 1) return;

    // Update the row
    qtySpan.innerText = newQty;
    subtotalCell.innerText = (newQty * price).toFixed(2);

    // Update the Grand Total
    updateGrandTotal();
}

function updateGrandTotal() {
    let total = 0;
    // Sum up all elements with the 'subtotal' class
    document.querySelectorAll('.subtotal').forEach(cell => {
        total += parseFloat(cell.innerText);
    });
    document.getElementById('grand-total').innerText = total.toFixed(2);
}



</script>

</head>





<body>

 <div class="container">
        <!-- Reusable Header -->
        <div th:replace="~{fragments/common :: header}"></div>

        <div class="middle-section">
            <!-- Reusable Sidebar -->
            <aside class="sidebar-container">
                <div th:replace="~{fragments/common :: sidebar}"></div>
            </aside>





  <!-- DYNAMIC MAIN WINDOW -->
  
  
            <main class="main-window">
            
				<div class="cart-container">
            
            
            
            
		             <h2 th:if="${session.userEmail != null}">
		              Shopping Cart for: <span th:text="${session.userEmail}"></span>
		             </h2>
            
            
            
            
            
            

    <!-- Added th:with to get the index of the current item -->
    
   <table  th:if="${session.userEmail != null and session.cart != null}"  border="1">
   	
   	 <thead>
       		 <tr>
           		 <th>Item Name</th>
           		 <th>Price</th>
          		 <th>Quantity</th>
            	<th>Subtotal</th>
       		 </tr>
    </thead>
    
    
    <tbody>
        <tr th:each="item, stat : ${session.cart}">
            <td th:text="${item.name}">Name</td>
            
            <!-- Price -->
            <td th:id="'price-' + ${stat.index}" th:text="${item.price}">0.00</td>
            
            <!-- Quantity Controls -->
            <td>
                <button th:onclick="'changeQty(' + ${stat.index} + ', -1)'">-</button>
                <span th:id="'qty-' + ${stat.index}" th:text="${item.quantity}">1</span>
                <button th:onclick="'changeQty(' + ${stat.index} + ', 1)'">+</button>
            </td>
            
            <!-- Subtotal (Price * Quantity) -->
            
               <td class="subtotal" th:id="'sub-' + ${stat.index}" 
                   th:text="${item.price * item.quantity}">0.00</td>
       
        </tr>
    </tbody>
    
    <tfoot>
    
        <tr>
	            <th colspan="3" style="text-align: right;">Grand Total:</th>
	            <!-- Calculates the sum of all subtotal values in the list -->
	            <td id="grand-total" 
	                th:text="${#aggregates.sum(session.cart.![price * quantity])}">0.00</td>
        </tr>
        
    </tfoot>
    
</table>

  
   <!-- If user tries to view cart without login (via direct URL) -->
    <div th:if="${session.userEmail == null}">
        <p>Your session has expired. Please <a th:href="@{/login}">Log In</a> again.</p>
    </div>
    
    <!-- If cart is empty -->
    <div th:if="${session.userEmail != null and (session.cart == null or session.cart.isEmpty())}">
        <p>Your cart is empty! <a th:href="@{/index}">Go back to shopping</a>.</p>
    </div>
  
  
  
  
  
       <div th:if="${session.userEmail != null and session.cart != null and !session.cart.isEmpty()}" 
     style="margin-top: 20px; text-align: right;">
    
    <form th:action="@{/checkout}" method="post">
        <button type="submit" 
                style="padding: 10px 20px; background-color: green; color: white; border: none; cursor: pointer;">
            Confirm Order & Checkout
        </button>
    </form>
</div>
  
    
    
    

    <a href="/shop/">Continue Shopping</a>
    
    		</div>
    
       </main>
 </div>
    
   

        <!-- Reusable Footer -->
        <div th:replace="~{fragments/common :: footer}"></div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>Create Account</title>
    <link rel="stylesheet" th:href="@{/css/header_footer_side_bar.css}">
    <style>
        .container { display: flex; }
        main { padding: 20px; flex-grow: 1; }
        .form-group { margin-bottom: 15px; }
        input { display: block; width: 300px; padding: 8px; margin-top: 5px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <!-- Header from fragments.html -->
    <div th:replace="~{fragments/common :: header}"></div>

    <div class="container">
        <!-- Sidebar from fragments.html -->
        <div th:replace="~{fragments/common :: sidebar}"></div>

        <main>
            <h2>Create New Account</h2>
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{fullName}" placeholder="Enter your name" required />
                </div>
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" th:field="*{email}" placeholder="example@mail.com" required />
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" th:field="*{mobile}" placeholder="10-digit number" required />
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" th:field="*{address}" placeholder="Street, City" required />
                </div>
                <div class="form-group">
                    <label>PIN Code</label>
                    <input type="text" th:field="*{pin}" placeholder="6-digit PIN" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" placeholder="Create password" required />
                </div>
                
                <button type="submit">Register Now</button>
            </form>
            <p>Already have an account? <a th:href="@{/login}">Login here</a></p>
        </main>
    </div>

    <!-- Footer from fragments.html -->
    <div th:replace="~{fragments/common:: footer}"></div>
</body>
</html>
